<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- navbar section  -->
    <nav class="navbar">
      <h3>Ecommerce</h3>
      <div>
        <h5 id="home">Home</h5>
        <h5 id="cart">Cart</h5>
        <h5 id="contact">Contact</h5>
        <h5 id="orders">Orders</h5>
      </div>
      <button class="btn-blue" id="loginBtn">Login</button>
    </nav>

<main class="main-container">
    <!-- products section  -->
    <div class="products-section" id="productPage">
      <h5 style="font-size: 22px; font-weight: bold">Products</h5>

      <!-- products main container  -->
      <main id="product-main-card" class="product-main-card">
        <!-- items shows here dynamically from api  -->
      </main>

      <!-- loading state  -->
      <main id="skeleton-main-card" class="skeleton-main-card">
        
      </main>
    </div>

    <!-- cart section  -->
    <div id="cartPage" class="cart-page">
      <h3>Cart</h3>
      <main id="cart-main-card" class="cart-main-card"></main>
    </div>


    <!-- product over view page  -->
     <section class="" id="productOverPage">
<h3>Product Details</h3>

     </section>
<main>

    <!-- login modal  -->
    <div id="main-login-modal">
      <div class="login-modal">
        <h2>Login</h2>

        <input type="email" placeholder="Email" />

        <input type="password" placeholder="Password" />

        <button id="login">Login</button>
      </div>
    </div>

 
    <script src="main.js"></script>
    <script src="cart.js"></script>
    <script src="navbar.js"></script>
    <script src="productOverView.js"></script>
  </body>
</html>
